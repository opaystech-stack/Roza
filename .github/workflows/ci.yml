name: CI

# Standalone CI for the Roza agent. Runs the full Definition-of-Done gate
# (install -> lint -> typecheck -> test) on every push and pull request.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` installs exactly from package-lock.json (deterministic) and
      # compiles the better-sqlite3 native binding. ubuntu-latest ships the
      # python3/make/g++ toolchain needed for that build.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
