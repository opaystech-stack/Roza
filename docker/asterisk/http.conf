; ===========================================================================
; http.conf — Asterisk built-in HTTP server (ARI control plane transport)
; Roza Agent Phase 3 (Voice & Telephony) — TEMPLATE, rendered at deploy time.
;
; This file enables the embedded HTTP server that ARI (ari.conf) rides on.
; The Node roza-agent talks to ARI over http://<asterisk>:<bindport>/ari and
; the matching WebSocket. See README.md for how ${VAR} placeholders are
; substituted (envsubst / entrypoint) and the ports the Node adapter expects.
;
; NO secret values are committed here. Every credential/host/port is a ${VAR}.
; ===========================================================================

[general]
enabled = yes
; Bind address for the ARI/HTTP server. On the internal compose network this
; is typically 0.0.0.0 so the roza-agent container can reach it by service
; name. Do NOT expose this port outside the internal network.
bindaddr = ${ARI_HTTP_BIND_ADDR}
; HTTP port the Node ARI client connects to. Asterisk default is 8088.
bindport = ${ARI_HTTP_PORT}
; Keep responses compact; the Node client does not need pretty-printed JSON.
enable_static = no
