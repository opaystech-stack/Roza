; ===========================================================================
; extensions.conf — Dialplan — Roza Agent Phase 3 TEMPLATE
;
; Routes calls into the "roza" Stasis (ARI) application so the Node adapter
; (telephony.asterisk.ts) drives the per-call turn loop, and supports
; ARI-originated outbound calls. Real-time media is bridged to the Node app;
; the PRIMARY media path is ARI External Media channels created
; programmatically by node-ari-client, with an AudioSocket dialplan context
; provided below as a self-contained alternative.
;
; ARI APP NAME: "roza"  (see ${ROZA_STASIS_APP} below and ari.conf/README).
;
; NO secret values here. Hosts/ports for the media bridge are ${VAR}
; placeholders rendered from env at deploy time:
;   ${AUDIOSOCKET_HOST} — host the roza-agent AudioSocket server listens on
;                         (the Node container's service name on the network)
;   ${AUDIOSOCKET_PORT} — TCP port of that AudioSocket server (e.g. 8090)
; ===========================================================================

[globals]
; The Stasis application name the Node ARI adapter subscribes to. Keep this in
; sync with the app name passed to node-ari-client (default: "roza").
ROZA_STASIS_APP = roza

; --- Inbound calls from the SIP trunk ---------------------------------------
; pjsip.conf routes the trunk endpoint here via `context = from-trunk`.
; Hand the channel straight to the roza Stasis app; the Node adapter answers,
; sets up media (ARI External Media), runs STT -> engine -> TTS, and hangs up.
[from-trunk]
exten => _.,1,NoOp(Inbound voice call from ${CALLERID(num)} -> Stasis ${ROZA_STASIS_APP})
 same => n,Stasis(${ROZA_STASIS_APP})
 same => n,Hangup()

; Catch a named service/DID as well (some trunks deliver a fixed exten).
exten => s,1,NoOp(Inbound voice call (s) -> Stasis ${ROZA_STASIS_APP})
 same => n,Stasis(${ROZA_STASIS_APP})
 same => n,Hangup()

; --- Outbound origination target --------------------------------------------
; The Node adapter places outbound calls via ARI `channels.originate`. When an
; originate targets the local dialplan instead of the trunk directly, this
; context dispatches the answered channel into the same Stasis app so the
; shared inbound/outbound turn loop applies.
[roza-outbound]
exten => _.,1,NoOp(Outbound voice call to ${EXTEN} -> Stasis ${ROZA_STASIS_APP})
 same => n,Stasis(${ROZA_STASIS_APP})
 same => n,Hangup()

; --- AudioSocket media bridge (alternative to ARI External Media) -----------
; Optional self-contained path: stream raw PCM frames to/from the Node
; roza-agent AudioSocket TCP server. The Node adapter sets the per-call
; ${AUDIOSOCKET_UUID} channel variable (a UUID it correlates to the call)
; before redirecting here. Connects to ${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT}.
[roza-audiosocket]
exten => _.,1,NoOp(Bridging media to AudioSocket ${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT})
 same => n,Answer()
 same => n,AudioSocket(${AUDIOSOCKET_UUID},${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT})
 same => n,Hangup()
