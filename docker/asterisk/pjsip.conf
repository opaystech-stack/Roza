; ===========================================================================
; pjsip.conf — SIP trunk via PJSIP — Roza Agent Phase 3 TEMPLATE
;
; Defines the UDP transport plus a single outbound/inbound SIP trunk that
; registers with / authenticates to the upstream SIP_Gateway or provider using
; the SIP_Trunk_Credentials. This lets Asterisk place calls to the PSTN
; through a standard SIP trunk (Req 6.1, 6.3, 6.4) and accept inbound calls,
; which the dialplan (extensions.conf) then dispatches into the "roza" Stasis
; application for the Node adapter to drive.
;
; NO secret values are committed here. Host/port/user/password/realm are all
; ${VAR} placeholders, rendered from environment at deploy time (see README).
;   ${SIP_HOST}     — registrar / proxy host of the trunk
;   ${SIP_PORT}     — trunk signalling port (e.g. 5060)
;   ${SIP_USER}     — trunk auth username / registration user
;   ${SIP_PASSWORD} — trunk auth secret (never logged, never committed)
;   ${SIP_REALM}    — auth realm / domain advertised by the provider
;   ${SIP_LOCAL_PORT} — local UDP bind port for Asterisk (e.g. 5060)
; ===========================================================================

; --- Transport (UDP) --------------------------------------------------------
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:${SIP_LOCAL_PORT}

; --- Outbound registration to the upstream trunk ----------------------------
[roza-trunk-reg]
type = registration
transport = transport-udp
outbound_auth = roza-trunk-auth
server_uri = sip:${SIP_HOST}:${SIP_PORT}
client_uri = sip:${SIP_USER}@${SIP_HOST}:${SIP_PORT}
contact_user = ${SIP_USER}
retry_interval = 60
forbidden_retry_interval = 300
expiration = 3600

; --- Authentication (credentials injected from env) -------------------------
[roza-trunk-auth]
type = auth
auth_type = userpass
username = ${SIP_USER}
password = ${SIP_PASSWORD}
realm = ${SIP_REALM}

; --- Address of Record / contact for the trunk ------------------------------
[roza-trunk]
type = aor
contact = sip:${SIP_HOST}:${SIP_PORT}
qualify_frequency = 60

; --- Endpoint: media + dialplan entry context -------------------------------
[roza-trunk]
type = endpoint
transport = transport-udp
context = from-trunk
disallow = all
; Narrowband + wideband codecs aligned with the audio.ts PCM contract
; (8 kHz / 16 kHz). ulaw/alaw for classic telephony, slin16 for wideband.
allow = ulaw,alaw,slin16
outbound_auth = roza-trunk-auth
aors = roza-trunk
from_user = ${SIP_USER}
from_domain = ${SIP_REALM}
direct_media = no

; --- Identify inbound traffic from the provider as this endpoint ------------
[roza-trunk]
type = identify
endpoint = roza-trunk
match = ${SIP_HOST}
