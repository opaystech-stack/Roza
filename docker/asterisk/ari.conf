; ===========================================================================
; ari.conf — Asterisk REST Interface (ARI) — Roza Agent Phase 3 TEMPLATE
;
; Enables ARI and defines the single control-plane user the Node roza-agent
; authenticates as. The Node adapter (src/connectors/voice/telephony.asterisk.ts)
; connects node-ari-client to the Stasis application named "roza".
;
; CREDENTIAL CHOICE (documented per task):
;   The ARI control-plane user is given its OWN dedicated env placeholders
;   ${ARI_USERNAME} / ${ARI_PASSWORD}, kept SEPARATE from the SIP trunk
;   credentials (${SIP_USER}/${SIP_PASSWORD} in pjsip.conf). Rationale:
;     * ARI auth (HTTP/WebSocket control plane) is a different trust boundary
;       than the SIP trunk registration (telephony media/signalling plane);
;       rotating or scoping one must not force rotating the other.
;     * It mirrors the design's separation of the control plane (ARI) from the
;       media/SIP plane in Component V7.
;   If an operator prefers to reuse the SIP credentials, point ${ARI_USERNAME}
;   and ${ARI_PASSWORD} at the same secret source at deploy time — no change
;   to this template is required.
;
; ARI APP NAME: "roza"  (the Stasis app the dialplan dispatches into and the
;   name the Node adapter subscribes to — see extensions.conf + README.md).
;
; NO secret values are committed here. Everything is a ${VAR} placeholder.
; ===========================================================================

[general]
enabled = yes
; Plain JSON (the Node client parses it directly).
pretty = no
; Restrict CORS to the internal origin(s) the operator configures; never "*"
; in production. Rendered from env at deploy time.
allowed_origins = ${ARI_ALLOWED_ORIGINS}

; --- ARI control-plane user (username is the section header) ----------------
; node-ari-client connects as ${ARI_USERNAME} with ${ARI_PASSWORD}.
[${ARI_USERNAME}]
type = user
read_only = no
password = ${ARI_PASSWORD}
; The password value above is injected from the environment at render time and
; is never committed. 'plain' means Asterisk reads it verbatim from the
; rendered file (which lives only inside the container, populated from secrets).
password_format = plain
