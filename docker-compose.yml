# ==========================================
# docker-compose.yml — Roza Agent (Phase 4: avatar video & live streaming)
#
# Convenience for running Roza locally / outside Dokploy. Defines the services
# on a shared internal compose network:
#
#   * roza-agent — the Node.js / TypeScript Cognitive_Engine (single isolated
#     SQLite mind in ./data). Bundles the Piper (TTS) and whisper.cpp (STT)
#     binaries inside its own image; talks to Asterisk over ARI + AudioSocket.
#   * asterisk   — a self-hosted, open-source SIP/VoIP gateway (Asterisk, GPLv2)
#     reachable by roza-agent only on the internal compose network. Roza's Node
#     code controls it over the ARI HTTP/WebSocket control plane and bridges
#     real-time audio over AudioSocket/External-Media (RTP). Swapping Asterisk
#     for an embedded SIP/WebRTC client later only touches telephony.asterisk.ts.
#   * avatar-renderer — (Phase 4) a SEPARATE self-hosted sidecar process that
#     performs the talking-head/lip-sync ML inference. roza-agent runs NO ML
#     in-process (Req 2.6): it orchestrates this sidecar over an HTTP/IPC
#     boundary (AVATAR_RENDERER_ENDPOINT) behind a swappable interface
#     (src/connectors/avatar/renderer.ts). Built from docker/avatar-renderer/
#     (LivePortrait MIT code + a commercially-licensed face-analysis substitute
#     + a commercially-licensed lip-sync checkpoint). Reachable by roza-agent
#     only on the internal compose network; it exposes no committed secret.
#
# Configuration is injected via ${VAR} interpolation from the shell environment
# or a sibling `.env` file (copied from `.env.example`).
#
# NEVER hardcode secret values here. Provide them via a local `.env` file or
# your shell environment. SIP_* / TTS_* / STT_* / VOICE_* / AVATAR_* / MEET_* /
# STREAM_* / RTMP_* are the variable names src/config.ts reads at startup.
#
# -----------------------------------------------------------------------------
# Phase 4 host-level deployment constraints (DOCUMENTED, not hard runtime gates)
# -----------------------------------------------------------------------------
# The avatar PRESENCE pipeline relies on HOST-level virtual devices that live
# OUTSIDE these containers and must be provisioned by the operator on the host:
#
#   * Virtual_Camera — the `v4l2loopback` kernel module (GPL-2.0, loaded on the
#     host: `modprobe v4l2loopback`) exposes a /dev/video* node that roza-agent
#     feeds rendered frames into via GStreamer/ffmpeg (AVATAR_CAMERA_DEVICE).
#   * Virtual_Microphone — a PipeWire (or PulseAudio) null sink (MIT) on the
#     host exposes the reply audio as a microphone source (AVATAR_MIC_DEVICE).
#
# These are kernel-module / null-sink endpoints; they are deployment
# prerequisites surfaced as comments here, NOT services, and NOT a hard runtime
# requirement that aborts startup (with AVATAR_ENABLED=false nothing here is
# constructed). See docker/avatar-renderer/README.md for provisioning notes.
#
#   * CPU/GPU expectation (Req 10.2): conversational-latency lip-sync generally
#     wants a GPU on the avatar-renderer host. This is a DOCUMENTED deployment
#     constraint, NOT a hard runtime gate — on CPU-only hosts synthesis is
#     slower and Roza falls back to audio-only delivery (Req 9.2). Operators who
#     run the renderer on a GPU host should attach the GPU there (e.g. the
#     NVIDIA Container Toolkit `deploy.resources.reservations.devices` / `gpus`)
#     — left commented below so the default compose runs on a plain CPU VPS.
# ==========================================

services:
  roza-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: roza-agent:latest
    container_name: roza-agent
    restart: unless-stopped
    # roza-agent talks to Asterisk's ARI; start it after the gateway is up.
    depends_on:
      - asterisk
    networks:
      - roza-net
    environment:
      # --- Required secrets (startup aborts if missing/empty/whitespace) ---
      ROZA_PRIVATE_KEY: ${ROZA_PRIVATE_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}

      # --- Optional: OpenRouter model (default: openai/gpt-4o-mini) ---
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}

      # --- Optional: IANA timezone for Active_Window + timestamps ---
      #     (default: Africa/Kinshasa)
      ROZA_TIMEZONE: ${ROZA_TIMEZONE:-}

      # --- Optional: Active_Window bounds, 24-hour HH:MM ---
      #     (defaults: 07:00 / 22:00)
      ACTIVE_WINDOW_START: ${ACTIVE_WINDOW_START:-}
      ACTIVE_WINDOW_END: ${ACTIVE_WINDOW_END:-}

      # --- Optional: durable data directory (default: /app/data) ---
      #     Keep aligned with the volume mount target below.
      ROZA_DATA_DIR: ${ROZA_DATA_DIR:-/app/data}

      # --- Optional: journal encryption key version label (default: v1) ---
      ROZA_KEY_VERSION: ${ROZA_KEY_VERSION:-}

      # --- Phase 2: Telegram channel (free Bot API via grammY) ---
      #     TELEGRAM_ENABLED defaults to false; the bot token is required only
      #     when the channel is enabled and is NEVER hardcoded here.
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWLIST: ${TELEGRAM_ALLOWLIST:-}

      # --- Phase 2: Mail channel (open IMAP read + SMTP send) ---
      #     MAIL_ENABLED defaults to false; IMAP/SMTP host/port/user/password
      #     are required only when the channel is enabled. Secrets are injected
      #     via ${VAR} interpolation and NEVER hardcoded here.
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_IMAP_HOST: ${MAIL_IMAP_HOST:-}
      MAIL_IMAP_PORT: ${MAIL_IMAP_PORT:-}
      MAIL_IMAP_USER: ${MAIL_IMAP_USER:-}
      MAIL_IMAP_PASSWORD: ${MAIL_IMAP_PASSWORD:-}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-}
      MAIL_SMTP_USER: ${MAIL_SMTP_USER:-}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD:-}
      MAIL_ALLOWLIST: ${MAIL_ALLOWLIST:-}

      # --- Phase 3: Voice channel (self-hosted Piper TTS + whisper.cpp STT,
      #     Asterisk SIP/VoIP gateway). VOICE_ENABLED defaults to false; the
      #     SIP_* credentials are required only when the channel is enabled and
      #     are NEVER hardcoded here. Secrets are injected via ${VAR}. ---
      VOICE_ENABLED: ${VOICE_ENABLED:-false}

      # SIP trunk / gateway credentials (secret — required when VOICE_ENABLED=true).
      # SIP_HOST defaults to the in-network Asterisk service hostname so the Node
      # adapter reaches the gateway over the internal compose network.
      SIP_HOST: ${SIP_HOST:-asterisk}
      SIP_PORT: ${SIP_PORT:-}
      SIP_USER: ${SIP_USER:-}
      SIP_PASSWORD: ${SIP_PASSWORD:-}
      SIP_REALM: ${SIP_REALM:-}

      # Voice access control + right-to-disconnect inbound policy.
      VOICE_ALLOWLIST: ${VOICE_ALLOWLIST:-}
      VOICE_DEFAULT_ACCESS: ${VOICE_DEFAULT_ACCESS:-}
      VOICE_QUIET_HOURS_INBOUND: ${VOICE_QUIET_HOURS_INBOUND:-}

      # Text-to-Speech (Piper) tuning.
      TTS_ENGINE: ${TTS_ENGINE:-}
      TTS_VOICE: ${TTS_VOICE:-}
      TTS_MODEL: ${TTS_MODEL:-}
      TTS_MAX_REPLY_CHARS: ${TTS_MAX_REPLY_CHARS:-}
      TTS_LATENCY_MS: ${TTS_LATENCY_MS:-}

      # Speech-to-Text (whisper.cpp) tuning.
      STT_ENGINE: ${STT_ENGINE:-}
      STT_MODEL: ${STT_MODEL:-}
      STT_LATENCY_MS: ${STT_LATENCY_MS:-}

      # End-to-end and ring-timeout latency bounds.
      VOICE_RESPONSE_LATENCY_MS: ${VOICE_RESPONSE_LATENCY_MS:-}
      VOICE_RING_TIMEOUT_MS: ${VOICE_RING_TIMEOUT_MS:-}

      # --- Phase 4: Avatar video & live streaming (self-hosted, swappable) ---
      #     AVATAR_ENABLED defaults to false; with it false NONE of the avatar
      #     path is constructed and startup is byte-for-byte Phase 3. roza-agent
      #     performs NO ML in-process — it orchestrates the avatar-renderer
      #     sidecar over AVATAR_RENDERER_ENDPOINT (HTTP/IPC). MEET_*/STREAM_*
      #     secrets are required only when their sub-capability is enabled and
      #     are NEVER hardcoded here — injected via ${VAR} interpolation.
      AVATAR_ENABLED: ${AVATAR_ENABLED:-false}

      # Avatar_Video_Format the renderer must emit and the devices consume.
      AVATAR_WIDTH: ${AVATAR_WIDTH:-}
      AVATAR_HEIGHT: ${AVATAR_HEIGHT:-}
      AVATAR_FPS: ${AVATAR_FPS:-}
      AVATAR_PIXEL_FORMAT: ${AVATAR_PIXEL_FORMAT:-}

      # Synthesis latency budget; on overrun → audio-only fallback.
      AVATAR_RENDER_LATENCY_MS: ${AVATAR_RENDER_LATENCY_MS:-}

      # Renderer sidecar endpoint + engine label (NOT a secret). Defaults to the
      # in-network avatar-renderer service so the Node adapter reaches it over
      # the internal compose network.
      AVATAR_RENDERER_ENDPOINT: ${AVATAR_RENDERER_ENDPOINT:-http://avatar-renderer:9009}
      AVATAR_ENGINE: ${AVATAR_ENGINE:-}

      # Host virtual-device names (NOT secrets). These point at the host-level
      # v4l2loopback camera node and PipeWire null-sink source provisioned
      # outside the containers (see the header notes + avatar-renderer README).
      AVATAR_CAMERA_DEVICE: ${AVATAR_CAMERA_DEVICE:-}
      AVATAR_MIC_DEVICE: ${AVATAR_MIC_DEVICE:-}

      # Google Meet presence sub-capability. MEET_ENABLED defaults to false; the
      # Meet_Credentials (MEET_ACCOUNT/MEET_PASSWORD) are required only when it
      # is enabled, MEET_CONSENT must be true before any join, and credentials
      # are NEVER hardcoded here.
      MEET_ENABLED: ${MEET_ENABLED:-false}
      MEET_CONSENT: ${MEET_CONSENT:-false}
      MEET_ACCOUNT: ${MEET_ACCOUNT:-}
      MEET_PASSWORD: ${MEET_PASSWORD:-}

      # Optional live RTMP streaming sub-capability. STREAM_ENABLED defaults to
      # false; the STREAM_KEY is a secret required only when it is enabled and
      # is NEVER hardcoded or logged. RTMP_URL is the RTMP_Target ingest URL.
      STREAM_ENABLED: ${STREAM_ENABLED:-false}
      RTMP_URL: ${RTMP_URL:-}
      STREAM_KEY: ${STREAM_KEY:-}
    volumes:
      # Durable volume: persists roza_mind.sqlite across container restarts.
      - ./data:/app/data

  asterisk:
    # Self-hosted, open-source SIP/VoIP gateway (GPLv2). Pinned community image;
    # operators may further pin by digest for reproducible deploys. No paid
    # cloud telephony API is used.
    image: andrius/asterisk:18-current
    container_name: roza-asterisk
    restart: unless-stopped
    networks:
      - roza-net
    environment:
      # SIP trunk credentials are consumed by the templated Asterisk config
      # (docker/asterisk/*.conf) via env interpolation — never committed as
      # literal secret values. Same ${VAR} names as the Node service.
      SIP_HOST: ${SIP_HOST:-asterisk}
      SIP_PORT: ${SIP_PORT:-}
      SIP_USER: ${SIP_USER:-}
      SIP_PASSWORD: ${SIP_PASSWORD:-}
      SIP_REALM: ${SIP_REALM:-}
    volumes:
      # Templated Asterisk configuration (ari.conf, http.conf, pjsip.conf,
      # extensions.conf) added in a later task. Secrets are drawn from the
      # SIP_* env vars above; no secret value is committed to these files.
      - ./docker/asterisk:/etc/asterisk
    ports:
      # SIP signalling — published to the host so external SIP peers / the
      # SIP trunk can reach the gateway.
      - "5060:5060/udp"
      - "5060:5060/tcp"
      # RTP media port range for live call audio (AudioSocket/External-Media).
      - "10000-10100:10000-10100/udp"
    # NOTE: the ARI HTTP/WebSocket control plane (default port 8088) is
    # intentionally NOT published to the host. roza-agent reaches it only over
    # the internal `roza-net` network at http://asterisk:8088.

  avatar-renderer:
    # Phase 4: the EXTERNAL avatar-render sidecar — the ONLY component that
    # performs ML inference and the only one that benefits from a GPU. Built
    # from docker/avatar-renderer/ (LivePortrait MIT engine code + a
    # commercially-licensed face-analysis substitute such as MediaPipe Face
    # Landmarker / OpenCV YuNet + a commercially-licensed lip-sync checkpoint;
    # the non-commercial InsightFace/Wav2Lip stock weights are excluded — see
    # docker/avatar-renderer/README.md). roza-agent runs NO ML in-process: it
    # orchestrates this sidecar over the HTTP/IPC render endpoint behind the
    # swappable src/connectors/avatar/renderer.ts interface, so swapping engines
    # (MuseTalk, SadTalker, ...) only re-implements that adapter.
    #
    # Isolating it as a sidecar also lets it run on a DIFFERENT (GPU) host than
    # the Node container. It exposes ONLY the render endpoint and reads NO
    # committed secret value (AVATAR_* below are non-secret tuning/paths).
    build:
      context: .
      dockerfile: docker/avatar-renderer/Dockerfile
    image: roza-avatar-renderer:latest
    container_name: roza-avatar-renderer
    restart: unless-stopped
    networks:
      - roza-net
    environment:
      # Render endpoint bind + engine selection (NOT secrets). The endpoint host
      # the Node adapter targets is AVATAR_RENDERER_ENDPOINT on roza-agent; this
      # is the in-container listen address/port for the same service.
      AVATAR_RENDERER_BIND: ${AVATAR_RENDERER_BIND:-0.0.0.0}
      AVATAR_RENDERER_PORT: ${AVATAR_RENDERER_PORT:-9009}
      AVATAR_ENGINE: ${AVATAR_ENGINE:-}
      # Avatar_Video_Format the sidecar must emit (mirrors the Node config so
      # the produced frames match what the virtual camera consumes).
      AVATAR_WIDTH: ${AVATAR_WIDTH:-}
      AVATAR_HEIGHT: ${AVATAR_HEIGHT:-}
      AVATAR_FPS: ${AVATAR_FPS:-}
      AVATAR_PIXEL_FORMAT: ${AVATAR_PIXEL_FORMAT:-}
      # Operator-provisioned, commercially-licensed model-weights path (mounted
      # below). NOT a secret — a filesystem location inside the sidecar.
      AVATAR_WEIGHTS_DIR: ${AVATAR_WEIGHTS_DIR:-/opt/avatar/weights}
    volumes:
      # Operator-provided model weights / face-analysis assets, mounted
      # read-only. Kept OUT of the committed image so a commercially-licensed
      # checkpoint can be supplied at deploy time (the image ships only the
      # MIT engine code + the commercial face-analysis substitute).
      - ./docker/avatar-renderer/weights:/opt/avatar/weights:ro
    # The render endpoint is reachable by roza-agent only on the internal
    # `roza-net` network (http://avatar-renderer:9009) — intentionally NOT
    # published to the host.
    #
    # GPU is a DOCUMENTED deployment constraint, not a hard runtime gate
    # (Req 10.2/10.4): conversational-latency lip-sync wants a GPU, but the
    # sidecar also runs CPU-only (slower) and Roza falls back to audio-only.
    # To attach a GPU on a GPU host, uncomment (NVIDIA Container Toolkit):
    #   gpus: all
    #   # or, for compose deploy syntax:
    #   # deploy:
    #   #   resources:
    #   #     reservations:
    #   #       devices:
    #   #         - driver: nvidia
    #   #           count: 1
    #   #           capabilities: [gpu]

networks:
  # Internal bridge network shared by roza-agent and asterisk. Service-to-service
  # traffic (ARI control + AudioSocket media) stays on this network; only the
  # SIP/RTP ports above are exposed to the host.
  roza-net:
    driver: bridge
